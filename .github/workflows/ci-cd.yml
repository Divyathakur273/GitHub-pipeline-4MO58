name: Nodejs CI/CD 
on:
 push:
  branches:
   - main
 pull_request:
  branches:
   - main

 workflow_dispatch:

jobs:
 docker-build-push:
   runs-on: ubuntu-latest
   steps:
   
     - name: Checkout Repository
       uses: actions/checkout@v4
    
     - name: Setup NodeJS
       uses: actions/setup-node@v4
       with:
        node-version: 19
        cache: 'npm'

     - name: Install Dependencies 
       run: npm install

     - name: Build Image
       run: docker build -t ${{ secrets.DOCKER_USERNAME }}/4om58image:latest .
     
     - name: login to dockerhub
       uses: docker/login-action@v4
         with:
           username: ${{ secrets.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_PASSWORD }} 
     - name: Push Image
       run: docker push ${{ secrets.DOCKER_USERNAME}}/4om58:latest
      


     
